<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Stash Shop Sync</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3e3e7a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stash Sync" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="description" content="Shopify × DecoNetwork Production Bridge" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      /* Global Font Overrides */
      * {
        font-family: 'Roboto Condensed', sans-serif !important;
      }

      body {
        background-color: #f3f4f6;
        letter-spacing: -0.01em;
      }

      /* Force All Headers to be Capitalized */
      h1, h2, h3, h4, h5, h6, 
      th, 
      label,
      .nav-tab, 
      .stats-title, 
      .ui-header,
      .modal-header-title {
        text-transform: uppercase !important;
        letter-spacing: 0.06em !important;
        font-weight: 700 !important;
      }

      /* Custom Scrollbar */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Print Styles */
      @media print {
        @page {
          size: 6in 4in landscape;
          margin: 0;
        }
        body * {
          visibility: hidden;
        }
        #printable-label-container, #printable-label-container * {
          visibility: visible;
        }
        #printable-label-container {
          position: fixed;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          margin: 0;
          padding: 0;
          background: white;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <!-- Vite will automatically bundle index.tsx into the final deployment -->
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Check for updates every 60 seconds
            setInterval(() => reg.update(), 60000);
            // When a new SW is found and activated, reload to get fresh code
            reg.addEventListener('updatefound', () => {
              const newSW = reg.installing;
              if (newSW) {
                newSW.addEventListener('statechange', () => {
                  if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
                    window.location.reload();
                  }
                });
              }
            });
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
